<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtumate</title>
    <script>
      (function () {
        try {
          var settings = localStorage.getItem("settings");
          if (settings) {
            var parsed = JSON.parse(settings);
            if (parsed.theme === "dark") {
              document.documentElement.classList.add("app-dark");
            }
          } else {
            document.documentElement.classList.add("app-dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <style>
        body {
          margin: 0;
          background-color: #fafafa;
        }
        html.app-dark body {
          background-color: #09090b;
        }

        .global-loader-container {
          --bg: #fafafa;
          --fg: #22c55e;
          --trans-dur: 0.3s;
          display: grid;
          place-items: center;
          height: 100vh;
          width: 100vw;
        }

        html.app-dark .global-loader-container {
          --bg: #09090b;
        }

        .pl {
          display: block;
          width: 16rem;
          height: auto;
        }

        .pl circle,
        .pl polygon {
          transition:
            fill var(--trans-dur),
            stroke var(--trans-dur);
        }

        .pl__cursor,
        .pl__ring {
          animation-duration: 1.5s;
          animation-timing-function: cubic-bezier(0.37, 0, 0.63, 1);
          animation-iteration-count: infinite;
        }

        .pl__cursor {
          animation-name: cursor-a-drag;
        }

        .pl__cursor .pl__cursor {
          animation-name: cursor-b-drag;
        }

        .pl__ring--1a {
          animation-name: ring-1a-move;
        }

        .pl__ring--1b {
          animation-name: ring-1b-move;
        }

        .pl__ring--2 {
          animation-name: ring-2-move;
        }

        @keyframes cursor-a-drag {
          0%,
          2.22%,
          75.56%,
          100% {
            animation-timing-function: cubic-bezier(0.61, 1, 0.88, 1);
            transform: translate(0, 0);
          }
          42.22% {
            animation-timing-function: cubic-bezier(0.37, 0, 0.63, 1);
            transform: translate(0, 52px);
          }
        }

        @keyframes cursor-b-drag {
          0%,
          2.22%,
          100% {
            transform: translate(0, 0);
          }
          42.22% {
            transform: translate(153px, 0);
          }
          75.56%,
          80% {
            transform: translate(120px, 0);
          }
        }

        @keyframes ring-1a-move {
          0%,
          2.22% {
            animation-timing-function: cubic-bezier(0.61, 1, 0.88, 1);
            transform: translate(0, 0);
          }
          42.22% {
            animation-timing-function: cubic-bezier(0.37, 0, 0.63, 1);
            transform: translate(0, 52px);
          }
          75.56%,
          100% {
            transform: translate(0, 0);
          }
        }

        @keyframes ring-1b-move {
          0% {
            transform: translate(0, 0) scale(1);
          }
          2.22% {
            transform: translate(0, 0) scale(1.1);
          }
          42.22% {
            transform: translate(153px, 0) scale(1.2);
          }
          75.56% {
            transform: translate(120px, 0) scale(1.2);
          }
          80%,
          100% {
            transform: translate(120px, 0) scale(1);
          }
        }

        @keyframes ring-2-move {
          0% {
            transform: translate(0, 0) scale(1);
          }
          28.89% {
            transform: translate(0, 0) scale(1);
          }
          46.67%,
          100% {
            transform: translate(-120px, 0) scale(1);
          }
        }
      </style>
      <div class="global-loader-container">
        <svg
          class="pl"
          viewBox="0 0 370 370"
          width="370"
          height="370"
          aria-label="A cursor dragging the first of three dots into the second one’s position, pushing the second one into the first’s previous spot"
        >
          <g fill="var(--bg)" stroke-linejoin="round">
            <g transform="translate(305, 185)">
              <g class="pl__ring">
                <circle r="50" stroke="var(--bg)" stroke-width="18" />
                <circle r="50" stroke="var(--fg)" stroke-width="6" />
              </g>
            </g>
            <g transform="translate(185, 185)">
              <g class="pl__ring pl__ring--2">
                <circle r="50" stroke="var(--bg)" stroke-width="18" />
                <circle r="50" stroke="var(--fg)" stroke-width="6" />
              </g>
            </g>
            <g transform="translate(65, 185)">
              <g class="pl__ring pl__ring--1a">
                <g class="pl__ring pl__ring--1b">
                  <circle r="50" stroke="var(--bg)" stroke-width="18" />
                  <circle r="50" stroke="var(--fg)" stroke-width="6" />
                </g>
              </g>
            </g>
            <g transform="translate(65, 185)">
              <g class="pl__cursor">
                <g class="pl__cursor">
                  <g transform="rotate(-23.63,0,0)" stroke-width="6">
                    <polygon
                      points="0 0, -35 80, -12 70, -12 105, 12 105, 12 70, 35 80"
                      stroke="var(--bg)"
                      stroke-width="18"
                    />
                    <polygon
                      points="0 0, -35 80, -12 70, -12 105, 12 105, 12 70, 35 80"
                      stroke="var(--fg)"
                      stroke-width="6"
                    />
                  </g>
                </g>
              </g>
            </g>
          </g>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
